<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강의실 예약 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .slot-available { background-color: white; color: #64748b; border-color: #e2e8f0; }
        .slot-selected { background-color: #4f46e5; color: white; border-color: #4f46e5; transform: scale(0.98); }
        .slot-booked { background-color: #f1f5f9; color: #cbd5e1; border-color: #f1f5f9; cursor: not-allowed; }
        .slot-class { background-color: #fee2e2; color: #ef4444; border-color: #fecaca; cursor: not-allowed; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-slate-900">강의실 예약</h1>
                <p class="text-slate-500 text-sm mt-1">실시간 예약 현황을 확인하세요.</p>
            </div>
            <div id="auth-status" class="text-xs font-medium px-3 py-1 bg-slate-100 text-slate-500 rounded-full">
                서버 연결 중...
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <label class="block text-sm font-semibold text-slate-700 mb-3">날짜 선택</label>
                    <input type="date" id="datePicker" class="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <label class="block text-sm font-semibold text-slate-700 mb-3">강의실 선택</label>
                    <div class="grid grid-cols-1 gap-2">
                        <button onclick="setRoom('103호')" data-room="103호" class="room-btn p-3 rounded-xl border border-slate-200 text-left font-semibold hover:bg-slate-50 transition-all">103호</button>
                        <button onclick="setRoom('108호')" data-room="108호" class="room-btn p-3 rounded-xl border border-slate-200 text-left font-semibold hover:bg-slate-50 transition-all">108호</button>
                        <button onclick="setRoom('201호')" data-room="201호" class="room-btn p-3 rounded-xl border border-slate-200 text-left font-semibold hover:bg-slate-50 transition-all">201호</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div id="no-selection" class="bg-white rounded-2xl shadow-sm border border-slate-200 h-full flex flex-col items-center justify-center p-12 text-slate-400">
                    <svg class="w-12 h-12 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <p>강의실을 선택하면 예약 가능한 시간이 표시됩니다.</p>
                </div>

                <div id="selection-ui" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                    <div class="flex justify-between items-end mb-6">
                        <div>
                            <h2 id="selected-info" class="text-xl font-bold text-slate-900">강의실 예약</h2>
                            <p id="selected-date-display" class="text-sm text-indigo-600 font-medium"></p>
                        </div>
                    </div>

                    <div id="timeGrid" class="grid grid-cols-3 sm:grid-cols-4 gap-3 mb-8">
                        </div>

                    <div class="space-y-4 pt-6 border-t border-slate-100">
                        <input type="text" id="userName" placeholder="예약자 성함을 입력하세요" class="w-full p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        <button id="bookBtn" disabled class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold disabled:bg-slate-200 disabled:cursor-not-allowed hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100">
                            <span id="selectedCountText">시간을 선택해 주세요</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-12 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h2 class="font-bold text-slate-900">실시간 예약 내역</h2>
                <div class="flex gap-2 bg-slate-100 p-1 rounded-lg">
                    <button onclick="setHistoryFilter('전체')" data-tab="전체" class="history-tab px-3 py-1 text-xs font-semibold rounded-md bg-white shadow-sm text-slate-800">전체</button>
                    <button onclick="setHistoryFilter('103호')" data-tab="103호" class="history-tab px-3 py-1 text-xs font-semibold rounded-md text-slate-500">103호</button>
                    <button onclick="setHistoryFilter('108호')" data-tab="108호" class="history-tab px-3 py-1 text-xs font-semibold rounded-md text-slate-500">108호</button>
                    <button onclick="setHistoryFilter('201호')" data-tab="201호" class="history-tab px-3 py-1 text-xs font-semibold rounded-md text-slate-500">201호</button>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 text-slate-500 font-medium">
                        <tr>
                            <th class="p-4">날짜</th>
                            <th class="p-4">강의실</th>
                            <th class="p-4">시간</th>
                            <th class="p-4">예약자</th>
                            <th class="p-4 text-right">신청시간</th>
                            <th class="p-4 text-center">관리</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody" class="divide-y divide-slate-100">
                        </tbody>
                </table>
                <div id="no-history-msg" class="p-12 text-center text-slate-400 hidden">예약 내역이 없습니다.</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAO2ZYMNnjx0wCBuA3nXhfBSUSmxi3k5yQ",
            authDomain: "classroom-reservation-b5062.firebaseapp.com",
            projectId: "classroom-reservation-b5062",
            storageBucket: "classroom-reservation-b5062.firebasestorage.app",
            messagingSenderId: "903563560410",
            appId: "1:903563560410:web:5b8bdbd031b8b8d3586ce3",
            measurementId: "G-23S1686YXS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const classData = {
            "103호": { 2: ["09:00", "10:00", "11:00", "15:00", "16:00"], 3: ["10:00", "11:00", "13:00", "14:00", "15:00"], 4: ["10:00", "11:00", "13:00", "14:00", "15:00"], 5: ["13:00", "14:00", "15:00", "16:00"] },
            "108호": { 1: ["09:00", "10:00", "13:00", "14:00"], 2: ["09:00", "10:00", "11:00", "17:00", "18:00"], 3: ["09:00", "10:00", "11:00", "13:00", "16:00", "18:00"], 4: ["09:00", "10:00", "11:00", "15:00", "16:00"], 5: ["09:00", "10:00", "11:00", "13:00"] },
            "201호": {}
        };
        const timeSlots = ["09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00", "19:00", "20:00"];

        let selectedRoom = "";
        let selectedTimes = [];
        let currentReservations = [];
        let historyFilter = "전체";

        const datePicker = document.getElementById('datePicker');
        const todayStr = new Date().toISOString().split('T')[0];
        datePicker.value = todayStr;
        datePicker.min = todayStr;

        const q = query(collection(db, "reservations"), orderBy("createdAt", "desc"));
        onSnapshot(q, (querySnapshot) => {
            currentReservations = [];
            querySnapshot.forEach((doc) => {
                currentReservations.push({ id: doc.id, ...doc.data() });
            });
            document.getElementById('auth-status').innerText = "실시간 서버 연결됨";
            document.getElementById('auth-status').className = "text-xs font-medium px-3 py-1 bg-green-100 text-green-700 rounded-full";
            if(selectedRoom) renderGrid();
            renderHistory();
        });

        window.setRoom = (room) => {
            selectedRoom = room;
            selectedTimes = [];
            document.getElementById('no-selection').classList.add('hidden');
            document.getElementById('selection-ui').classList.remove('hidden');
            document.getElementById('selected-info').innerText = `${room} 예약`;
            document.getElementById('selected-date-display').innerText = datePicker.value;
            
            document.querySelectorAll('.room-btn').forEach(btn => {
                if(btn.dataset.room === room) btn.classList.add('bg-indigo-600', 'text-white', 'border-indigo-600');
                else btn.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-600');
            });
            updateBookBtn();
            renderGrid();
        };

        window.setHistoryFilter = (room) => {
            historyFilter = room;
            document.querySelectorAll('.history-tab').forEach(btn => {
                if(btn.dataset.tab === room) {
                    btn.classList.add('bg-white', 'text-slate-800', 'shadow-sm');
                    btn.classList.remove('text-slate-500');
                } else {
                    btn.classList.remove('bg-white', 'text-slate-800', 'shadow-sm');
                    btn.classList.add('text-slate-500');
                }
            });
            renderHistory();
        };

        datePicker.onchange = () => {
            if(selectedRoom) {
                selectedTimes = [];
                document.getElementById('selected-date-display').innerText = datePicker.value;
                updateBookBtn();
                renderGrid();
            }
        };

        function updateBookBtn() {
            const btn = document.getElementById('bookBtn');
            const btnText = document.getElementById('selectedCountText');
            if (selectedTimes.length > 0) {
                btnText.innerText = `${selectedTimes.length}개 시간 예약하기`;
                btn.disabled = false;
            } else {
                btnText.innerText = `시간을 선택해 주세요`;
                btn.disabled = true;
            }
        }

        function renderGrid() {
            const grid = document.getElementById('timeGrid');
            grid.innerHTML = "";
            const dayOfWeek = new Date(datePicker.value).getDay();
            const classes = (classData[selectedRoom] && classData[selectedRoom][dayOfWeek]) || [];
            const bookedTimes = currentReservations
                .filter(res => res.room === selectedRoom && res.date === datePicker.value)
                .map(res => res.time);

            timeSlots.forEach(time => {
                const btn = document.createElement('button');
                const isClass = classes.includes(time);
                const isBooked = bookedTimes.includes(time);
                const isSelected = selectedTimes.includes(time);

                btn.className = "p-3 rounded-xl border text-sm font-bold transition-all h-16 flex flex-col items-center justify-center";
                
                if(isClass) {
                    btn.classList.add('slot-class');
                    btn.innerHTML = `<span>${time}</span><span class="text-[9px] font-normal">정규수업</span>`;
                } else if(isBooked) {
                    btn.classList.add('slot-booked');
                    btn.innerHTML = `<span>${time}</span><span class="text-[9px] font-normal">예약완료</span>`;
                } else {
                    btn.classList.add(isSelected ? 'slot-selected' : 'slot-available');
                    btn.innerText = time;
                    btn.onclick = () => {
                        if (selectedTimes.includes(time)) {
                            selectedTimes = selectedTimes.filter(t => t !== time);
                        } else {
                            selectedTimes.push(time);
                        }
                        updateBookBtn();
                        renderGrid();
                    };
                }
                grid.appendChild(btn);
            });
        }

        function renderHistory() {
            const tbody = document.getElementById('historyTableBody');
            const noHistory = document.getElementById('no-history-msg');
            tbody.innerHTML = "";
            
            let filtered = currentReservations;
            if(historyFilter !== "전체") {
                filtered = filtered.filter(res => res.room === historyFilter);
            }

            if(filtered.length === 0) {
                noHistory.classList.remove('hidden');
                return;
            } else {
                noHistory.classList.add('hidden');
            }

            filtered.forEach(res => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors";
                
                const dateObj = new Date(res.createdAt);
                const formattedDate = !isNaN(dateObj) ? `${dateObj.getMonth()+1}/${dateObj.getDate()} ${dateObj.getHours()}:${String(dateObj.getMinutes()).padStart(2, '0')}` : '-';

                tr.innerHTML = `
                    <td class="p-4 font-medium text-slate-600">${res.date}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded-md text-[10px] font-bold ${res.room === '201호' ? 'bg-purple-100 text-purple-700' : 'bg-indigo-100 text-indigo-700'}">${res.room}</span></td>
                    <td class="p-4 font-bold text-slate-800">${res.time}</td>
                    <td class="p-4 text-slate-500">${res.name}</td>
                    <td class="p-4 text-right text-[11px] text-slate-400">${formattedDate}</td>
                    <td class="p-4 text-center">
                        <button onclick="cancelReservation('${res.id}')" class="px-3 py-1 bg-red-50 text-red-600 hover:bg-red-100 rounded-lg text-xs font-bold transition-colors border border-red-100">취소</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('bookBtn').onclick = async () => {
            const name = document.getElementById('userName').value.trim();
            if(!name) { alert("예약자 성함을 입력해주세요."); return; }
            const now = new Date().toISOString();
            try {
                for(const time of selectedTimes) {
                    await addDoc(collection(db, "reservations"), {
                        room: selectedRoom,
                        time: time,
                        date: datePicker.value,
                        name: name,
                        createdAt: now
                    });
                }
                alert("성공적으로 예약되었습니다.");
                document.getElementById('userName').value = "";
                selectedTimes = [];
                updateBookBtn();
            } catch (e) {
                alert("예약 중 오류가 발생했습니다: " + e.message);
            }
        };

        window.cancelReservation = async (id) => {
            if(confirm("해당 예약을 취소하시겠습니까?")) {
                try {
                    await deleteDoc(doc(db, "reservations", id));
                    alert("취소 처리되었습니다.");
                } catch (e) {
                    alert("취소 중 오류가 발생했습니다.");
                }
            }
        };
    </script>
</body>
</html>
