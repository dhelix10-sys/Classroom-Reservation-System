<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. 사용자님의 파이어베이스 연결 열쇠
        const firebaseConfig = {
            apiKey: "AIzaSyAO2ZYMNnjx0wCBuA3nXhfBSUSmxi3k5yQ",
            authDomain: "classroom-reservation-b5062.firebaseapp.com",
            projectId: "classroom-reservation-b5062",
            storageBucket: "classroom-reservation-b5062.firebasestorage.app",
            messagingSenderId: "903563560410",
            appId: "1:903563560410:web:5b8bdbd031b8b8d3586ce3",
            measurementId: "G-23S1686YXS"
        };

        // 2. 파이어베이스 초기화
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 정규 수업 데이터
        const classData = {
            "103호": { 2: ["09:00", "10:00", "11:00", "15:00", "16:00"], 3: ["10:00", "11:00", "13:00", "14:00", "15:00"], 4: ["10:00", "11:00", "13:00", "14:00", "15:00"], 5: ["13:00", "14:00", "15:00", "16:00"] },
            "108호": { 1: ["09:00", "10:00", "13:00", "14:00"], 2: ["09:00", "10:00", "11:00", "17:00", "18:00"], 3: ["09:00", "10:00", "11:00", "13:00", "16:00", "18:00"], 4: ["09:00", "10:00", "11:00", "15:00", "16:00"], 5: ["09:00", "10:00", "11:00", "13:00"] },
            "201호": {}
        };
        const timeSlots = ["09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00", "19:00", "20:00"];

        let selectedRoom = "";
        let selectedTimes = [];
        let currentReservations = []; // 서버에서 받아올 예약 데이터
        let historyFilter = "전체";

        const datePicker = document.getElementById('datePicker');
        const todayStr = new Date().toISOString().split('T')[0];
        datePicker.value = todayStr;
        datePicker.min = todayStr;

        // 3. 실시간 데이터 동기화 (가장 중요!)
        // 서버의 데이터가 변하면 모든 사용자의 화면이 자동으로 바뀝니다.
        const q = query(collection(db, "reservations"), orderBy("createdAt", "desc"));
        onSnapshot(q, (querySnapshot) => {
            currentReservations = [];
            querySnapshot.forEach((doc) => {
                currentReservations.push({ id: doc.id, ...doc.data() });
            });
            document.getElementById('auth-status').innerText = "실시간 서버 연결됨";
            document.getElementById('auth-status').className = "text-xs font-medium px-3 py-1 bg-green-100 text-green-700 rounded-full";
            if(selectedRoom) renderGrid();
            renderHistory();
        });

        // 기능 함수들을 윈도우 객체에 등록 (HTML에서 호출 가능하게 함)
        window.setRoom = (room) => {
            selectedRoom = room;
            selectedTimes = [];
            document.getElementById('no-selection').classList.add('hidden');
            document.getElementById('selection-ui').classList.remove('hidden');
            document.getElementById('selected-info').innerText = `${room} 예약`;
            document.getElementById('selected-date-display').innerText = datePicker.value;
            
            document.querySelectorAll('.room-btn').forEach(btn => {
                if(btn.dataset.room === room) btn.classList.add('bg-indigo-600', 'text-white', 'border-indigo-600');
                else btn.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-600');
            });
            updateBookBtn();
            renderGrid();
        };

        window.setHistoryFilter = (room) => {
            historyFilter = room;
            document.querySelectorAll('.history-tab').forEach(btn => {
                if(btn.dataset.tab === room) {
                    btn.classList.add('bg-white', 'text-slate-800', 'shadow-sm');
                    btn.classList.remove('text-slate-500');
                } else {
                    btn.classList.remove('bg-white', 'text-slate-800', 'shadow-sm');
                    btn.classList.add('text-slate-500');
                }
            });
            renderHistory();
        };

        datePicker.onchange = () => {
            if(selectedRoom) {
                selectedTimes = [];
                document.getElementById('selected-date-display').innerText = datePicker.value;
                updateBookBtn();
                renderGrid();
            }
        };

        function updateBookBtn() {
            const btn = document.getElementById('bookBtn');
            const btnText = document.getElementById('selectedCountText');
            if (selectedTimes.length > 0) {
                btnText.innerText = `${selectedTimes.length}개 시간 예약하기`;
                btn.disabled = false;
            } else {
                btnText.innerText = `시간을 선택해 주세요`;
                btn.disabled = true;
            }
        }

        function renderGrid() {
            const grid = document.getElementById('timeGrid');
            grid.innerHTML = "";
            const dayOfWeek = new Date(datePicker.value).getDay();
            const classes = (classData[selectedRoom] && classData[selectedRoom][dayOfWeek]) || [];
            const bookedTimes = currentReservations
                .filter(res => res.room === selectedRoom && res.date === datePicker.value)
                .map(res => res.time);

            timeSlots.forEach(time => {
                const btn = document.createElement('button');
                const isClass = classes.includes(time);
                const isBooked = bookedTimes.includes(time);
                const isSelected = selectedTimes.includes(time);

                btn.className = "p-3 rounded-xl border text-sm font-bold transition-all h-16 flex flex-col items-center justify-center";
                
                if(isClass) {
                    btn.classList.add('slot-class');
                    btn.innerHTML = `<span>${time}</span><span class="text-[9px] font-normal">정규수업</span>`;
                } else if(isBooked) {
                    btn.classList.add('slot-booked');
                    btn.innerHTML = `<span>${time}</span><span class="text-[9px] font-normal">예약완료</span>`;
                } else {
                    btn.classList.add(isSelected ? 'slot-selected' : 'slot-available');
                    btn.innerText = time;
                    btn.onclick = () => {
                        if (selectedTimes.includes(time)) {
                            selectedTimes = selectedTimes.filter(t => t !== time);
                        } else {
                            selectedTimes.push(time);
                        }
                        updateBookBtn();
                        renderGrid();
                    };
                }
                grid.appendChild(btn);
            });
        }

        function renderHistory() {
            const tbody = document.getElementById('historyTableBody');
            const noHistory = document.getElementById('no-history-msg');
            tbody.innerHTML = "";
            
            let filtered = currentReservations;
            if(historyFilter !== "전체") {
                filtered = filtered.filter(res => res.room === historyFilter);
            }

            if(filtered.length === 0) {
                noHistory.classList.remove('hidden');
                return;
            } else {
                noHistory.classList.add('hidden');
            }

            filtered.forEach(res => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors";
                
                const dateObj = new Date(res.createdAt);
                const formattedDate = !isNaN(dateObj) ? `${dateObj.getMonth()+1}/${dateObj.getDate()} ${dateObj.getHours()}:${String(dateObj.getMinutes()).padStart(2, '0')}` : '-';

                tr.innerHTML = `
                    <td class="p-4 font-medium text-slate-600">${res.date}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded-md text-[10px] font-bold ${res.room === '201호' ? 'bg-purple-100 text-purple-700' : 'bg-indigo-100 text-indigo-700'}">${res.room}</span></td>
                    <td class="p-4 font-bold text-slate-800">${res.time}</td>
                    <td class="p-4 text-slate-500">${res.name}</td>
                    <td class="p-4 text-right text-[11px] text-slate-400">${formattedDate}</td>
                    <td class="p-4 text-center">
                        <button onclick="cancelReservation('${res.id}')" class="px-3 py-1 bg-red-50 text-red-600 hover:bg-red-100 rounded-lg text-xs font-bold transition-colors border border-red-100">취소</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 4. 예약 데이터 서버에 저장
        document.getElementById('bookBtn').onclick = async () => {
            const name = document.getElementById('userName').value.trim();
            if(!name) { alert("예약자 성함을 입력해주세요."); return; }

            const now = new Date().toISOString();
            
            try {
                // 여러 칸을 선택했을 경우 각각 서버에 저장
                for(const time of selectedTimes) {
                    await addDoc(collection(db, "reservations"), {
                        room: selectedRoom,
                        time: time,
                        date: datePicker.value,
                        name: name,
                        createdAt: now
                    });
                }
                alert("성공적으로 예약되었습니다.");
                document.getElementById('userName').value = "";
                selectedTimes = [];
                updateBookBtn();
            } catch (e) {
                alert("예약 중 오류가 발생했습니다: " + e.message);
            }
        };

        // 5. 서버의 데이터 삭제 (취소)
        window.cancelReservation = async (id) => {
            if(confirm("해당 예약을 취소하시겠습니까?")) {
                try {
                    await deleteDoc(doc(db, "reservations", id));
                    alert("취소 처리되었습니다.");
                } catch (e) {
                    alert("취소 중 오류가 발생했습니다.");
                }
            }
        };
    </script>
