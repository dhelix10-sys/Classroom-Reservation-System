<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 제작자: 권정옥 -->
    <title>미생물분자생명과학과 강의실 예약시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #f1f5f9;
            color: #1e293b;
        }
        .app-container {
            max-width: 1000px;
            margin: 40px auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        .btn-room.active {
            background-color: #2563eb;
            color: white;
            border-color: #2563eb;
        }
        .time-slot:disabled {
            background-color: #f8fafc;
            color: #cbd5e1;
            cursor: not-allowed;
            border-color: #f1f5f9;
            text-decoration: line-through;
        }
        .time-slot.selected {
            background-color: #dbeafe;
            border-color: #3b82f6;
            color: #1e40af;
        }
    </style>
</head>
<body class="p-4">

    <div class="app-container">
        <!-- 상단 헤더 -->
        <div class="bg-slate-800 p-8 text-white text-center md:text-left">
            <h1 class="text-3xl font-bold">🏫 미생물분자생명과학과 강의실 예약시스템</h1>
        </div>

        <div class="p-8 grid grid-cols-1 md:grid-cols-12 gap-10">
            <!-- 왼쪽: 정보 입력 섹션 -->
            <div class="md:col-span-4 space-y-8">
                <section>
                    <h2 class="text-lg font-bold mb-4 flex items-center text-slate-700">
                        <span class="w-1.5 h-5 bg-blue-500 rounded-full mr-2"></span> 1. 예약 설정
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase mb-1 block">사용 날짜</label>
                            <input type="date" id="res-date" onchange="updateView()" class="w-full p-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase mb-1 block">강의실 선택</label>
                            <div class="space-y-2">
                                <button onclick="selectRoom('103호')" id="btn-103" class="btn-room w-full p-3 text-left border border-slate-200 rounded-xl hover:bg-slate-50 font-medium transition-all">103호 (일반강의실)</button>
                                <button onclick="selectRoom('108호')" id="btn-108" class="btn-room w-full p-3 text-left border border-slate-200 rounded-xl hover:bg-slate-50 font-medium transition-all">108호 (일반강의실)</button>
                                <button onclick="selectRoom('201호')" id="btn-201" class="btn-room w-full p-3 text-left border border-slate-200 rounded-xl hover:bg-slate-50 font-medium transition-all">201호 (세미나실)</button>
                            </div>
                        </div>
                    </div>
                </section>

                <section>
                    <h2 class="text-lg font-bold mb-4 flex items-center text-slate-700">
                        <span class="w-1.5 h-5 bg-blue-500 rounded-full mr-2"></span> 2. 사용자 정보
                    </h2>
                    <div class="space-y-3">
                        <input type="text" id="user-name" placeholder="예약자 성함" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-blue-500">
                        <input type="text" id="user-purpose" placeholder="사용 목적" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-blue-500">
                    </div>
                </section>
            </div>

            <!-- 오른쪽: 시간 선택 섹션 -->
            <div class="md:col-span-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-slate-800" id="room-title">강의실을 선택해 주세요</h2>
                    <span class="text-blue-600 font-bold" id="date-label"></span>
                </div>

                <div id="time-container" class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                    <!-- 자바스크립트로 시간 버튼 생성 -->
                </div>

                <button onclick="submitReservation()" class="w-full mt-10 py-4 bg-blue-600 text-white rounded-2xl font-bold text-xl hover:bg-blue-700 shadow-lg active:scale-95 transition-all">
                    예약 신청하기
                </button>
            </div>
        </div>

        <!-- 하단: 예약 히스토리 -->
        <div class="bg-slate-50 p-8 border-t border-slate-100">
            <h2 class="text-lg font-bold text-slate-700 mb-5">실시간 예약 내역</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead>
                        <tr class="text-slate-400 border-b border-slate-200">
                            <th class="pb-3 font-medium">예약 일시</th>
                            <th class="pb-3 font-medium">장소</th>
                            <th class="pb-3 font-medium">예약자</th>
                            <th class="pb-3 font-medium">목적</th>
                            <th class="text-right pb-3 font-medium">상태</th>
                        </tr>
                    </thead>
                    <tbody id="history-list" class="divide-y divide-slate-100 text-slate-600">
                        <!-- 예약 데이터 삽입 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 제작자 정보 -->
        <div class="p-6 text-center text-slate-400 text-xs border-t border-slate-100">
            © 2024 미생물분자생명과학과 | 제작자: <strong>권정옥</strong>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        /** * [강의실별 고정 수업 시간표]
         * 요일 코드 - 1:월, 2:화, 3:수, 4:목, 5:금
         */
        const classSchedule = {
            "103호": {
                2: ["09:00", "10:00", "11:00", "15:00", "16:00"], 
                3: ["10:00", "11:00", "13:00", "14:00", "15:00", "16:00"], 
                4: ["10:00", "11:00", "13:00", "14:00", "15:00", "16:00"], 
                5: ["13:00", "14:00", "15:00", "16:00"] 
            },
            "108호": {
                1: ["09:00", "10:00", "13:00", "14:00"],
                // 화요일: 17:00부터 수업 포함
                2: ["09:00", "10:00", "11:00", "17:00", "18:00", "19:00", "20:00"],
                // 수요일: 16:00 ~ 20:00 수업 포함
                3: ["09:00", "10:00", "11:00", "13:00", "14:00", "16:00", "17:00", "18:00", "19:00", "20:00"],
                // 목요일: 15:00 ~ 16:30 수업 포함 (15시, 16시 차단)
                4: ["09:00", "10:00", "11:00", "15:00", "16:00"],
                5: ["09:00", "10:00", "11:00", "13:00"]
            },
            "201호": {}
        };

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'micro-bio-reservation-v1';

        let selectedRoom = "";
        let selectedTime = "";
        let dbReservations = [];
        const times = ["09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00", "19:00", "20:00"];

        const dateInput = document.getElementById('res-date');
        const todayStr = new Date().toISOString().split('T')[0];
        dateInput.value = todayStr;
        dateInput.min = todayStr;
        document.getElementById('date-label').textContent = todayStr;

        async function startApp() {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
            onAuthStateChanged(auth, (user) => { 
                if (user) fetchReservations(); 
            });
        }

        window.selectRoom = (room) => {
            selectedRoom = room;
            selectedTime = "";
            document.querySelectorAll('.btn-room').forEach(b => b.classList.remove('active'));
            const btnId = `btn-${room.replace('호', '')}`;
            if(document.getElementById(btnId)) document.getElementById(btnId).classList.add('active');
            document.getElementById('room-title').textContent = room;
            updateView();
        };

        window.updateView = () => {
            document.getElementById('date-label').textContent = dateInput.value;
            renderTimes();
        };

        function renderTimes() {
            const container = document.getElementById('time-container');
            container.innerHTML = "";
            if (!selectedRoom) {
                container.innerHTML = '<p class="col-span-full text-center text-slate-400 py-12">강의실을 먼저 선택해 주세요.</p>';
                return;
            }

            const day = new Date(dateInput.value).getDay();
            const booked = dbReservations.filter(r => r.date === dateInput.value && r.room === selectedRoom).map(r => r.time);
            const classes = classSchedule[selectedRoom][day] || [];

            times.forEach(t => {
                const btn = document.createElement('button');
                const isOccupiedByBooking = booked.includes(t);
                const isOccupiedByClass = classes.includes(t);
                const isOccupied = isOccupiedByBooking || isOccupiedByClass;
                
                btn.className = `time-slot p-4 border rounded-xl font-medium transition-all ${selectedTime === t ? 'selected' : 'bg-white hover:border-blue-400'}`;
                btn.textContent = t;

                if (isOccupied) {
                    btn.disabled = true;
                    btn.textContent += isOccupiedByBooking ? " (예약됨)" : " (수업)";
                }

                btn.onclick = () => {
                    selectedTime = t;
                    renderTimes();
                };
                container.appendChild(btn);
            });
        }

        window.submitReservation = async () => {
            const name = document.getElementById('user-name').value.trim();
            const purpose = document.getElementById('user-purpose').value.trim();

            if (!selectedRoom || !selectedTime || !name) {
                alert("성함과 시간을 모두 선택해 주세요.");
                return;
            }

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'reservations'), {
                    room: selectedRoom,
                    date: dateInput.value,
                    time: selectedTime,
                    name,
                    purpose,
                    createdAt: serverTimestamp()
                });
                alert("예약 신청이 완료되었습니다!");
                selectedTime = "";
                document.getElementById('user-name').value = "";
                document.getElementById('user-purpose').value = "";
                updateView();
            } catch (e) { 
                alert("예약 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요."); 
            }
        };

        function fetchReservations() {
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'reservations');
            onSnapshot(q, (snapshot) => {
                dbReservations = snapshot.docs.map(doc => doc.data());
                renderHistory();
                updateView();
            }, (error) => console.error("Firestore Error:", error));
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            // 최신순 정렬 (최근 10개)
            const sorted = [...dbReservations].sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)).slice(0, 10);

            sorted.forEach(r => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="py-4 font-medium text-slate-800">${r.date} ${r.time}</td>
                    <td class="py-4 font-bold text-blue-600">${r.room}</td>
                    <td class="py-4">${r.name}</td>
                    <td class="py-4 text-slate-400 truncate max-w-[150px]">${r.purpose || '-'}</td>
                    <td class="py-4 text-right"><span class="bg-green-100 text-green-700 px-2 py-1 rounded text-[10px] font-bold">확정</span></td>
                `;
                list.appendChild(tr);
            });
        }

        startApp();
    </script>
</body>
</html>
